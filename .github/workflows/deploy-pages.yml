name: Deploy to GitHub Pages

# 构建静态导出并推送到 gh-pages 分支（Pages 源）。
# 不用官方 configure-pages/deploy-pages：它们首次开通需要
# 仓库设置权限，而 gh-pages 分支是自动开通的。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        run: npx next build
        env:
          NEXT_OUTPUT_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: /espace-semantique

      - run: touch out/.nojekyll

      - name: Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
